plexmediaserver::secure::cert_dir: '/var/lib/plexmediaserver/Resources/SSL'
plexmediaserver::secure::domain_name: "%{facts.networking.fqdn}"
plexmediaserver::secure::domain_email: puppet@%{facts.networking.domain}